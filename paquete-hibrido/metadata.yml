version: 1

documento:
  id: panel_administrativo_1_8_canjear_ticket_boleta_factura
  titulo: "1.8 Cómo canjear un ticket a boleta o factura en Panel Administrativo"
  modulo: "Ventas y Documentos"
  pantalla: "Búsqueda y gestión de comprobantes"
  objetivo: "Emitir una boleta electrónica o factura electrónica a partir de un ticket válido"

