version: 1

documento:
  id: panel_administrativo_canje_ticket_boleta_factura
  titulo: 1.8 Cómo canjear un ticket a boleta o factura en Panel Administrativo
  modulo: Ventas y Documentos
  pantalla: Búsqueda y gestión de comprobantes
  objetivo: Canjear un ticket válido por una boleta o factura desde el panel administrativo

fuentes:
  modalidad: codigo
  artefactos:
    - tipo: codigo
      referencia: /var/home/admin/Documentos/projects/yures/resources/views/layouts/sidebar.blade.php
      observacion: Confirma la navegación del menú Ventas y Documentos hacia Búsqueda y gestión de comprobantes.
    - tipo: codigo
      referencia: /var/home/admin/Documentos/projects/yures/resources/views/admin/sale/search.blade.php
      observacion: Define la pantalla, pestañas de búsqueda, modal Canjear Venta, campos, botones y mensaje informativo del canje.
    - tipo: codigo
      referencia: /var/home/admin/Documentos/projects/yures/resources/views/admin/sale/partial/result_table.blade.php
      observacion: Muestra la tabla de resultados y la condición visible para la opción Canjear ticket.
    - tipo: codigo
      referencia: /var/home/admin/Documentos/projects/yures/resources/admin/assets/js/sale/search_jquery.js
      observacion: Define los eventos de búsqueda, apertura del modal, validaciones del formulario y la acción CANJEAR.
    - tipo: codigo
      referencia: /var/home/admin/Documentos/projects/yures/resources/admin/assets/js/sale/search_jscript.js
      observacion: Confirma la carga de series, el envío del canje, la impresión del nuevo comprobante y la limpieza del modal.
    - tipo: codigo
      referencia: /var/home/admin/Documentos/projects/yures/resources/admin/assets/js/sale/index_jscript.js
      observacion: Define la búsqueda y autocompletado de cliente por DNI o RUC.
